\* spec: FlushCell
\* expect: VIOLATES INV_NoLostWrite
\* A4, the per-key SERIALIZATION assumption, as a negative control. Serialized=FALSE: with the poll-thread
\* serialization removed, a concurrent Append lands BETWEEN flushCell's database.write and its markPersisted.
\* The buffer is rebound to a new value that markPersisted then marks persisted though the durable store
\* only ever received the OLD value -- a lost write (INV_NoLostWrite violated). This proves the hazard the
\* serialization prevents is real; the paired positive is serial_holds (Serialized=TRUE).
SPECIFICATION Spec
CONSTANTS Serialized = FALSE
INVARIANT TypeOK
INVARIANT INV_NoLostWrite
