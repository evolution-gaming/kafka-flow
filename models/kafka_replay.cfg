\* spec: Kafka
\* expect: HOLDS
\* flags: -deadlock
\* The atomic binding, modelled faithfully -- commit lag included. A flush's transaction commits the
\* offset scheduled BEFORE it, so the committed offset genuinely trails the newest snapshot by up to the
\* in-flight round and a recovering owner can resume BELOW it: the replay window is real. What holds is
\* the honest pair: the committed offset never LEADS the snapshot (INV_CommittedNeverAhead -- events are
\* never acknowledged ahead of the state that covers them), and the offset-only marker lane closes the
\* lag (LIVE_CommitCatchesUp). The window's replayed events are dropped by the recovered-snapshot filter,
\* so safety and liveness hold end to end. The paired controls: kafka_lag_nofilter (filter off -- the
\* window's re-flush lands double-folded contents below the snapshot), kafka_replay_unbound (no binding
\* at all -- a plain produce is gated by nothing).
SPECIFICATION Spec
CONSTANTS MaxOffset = 3  Coupled = TRUE  Seeded = TRUE  AtomicBind = TRUE  Refresh = TRUE  ReplayFilter = TRUE
INVARIANT RefTypeOK
INVARIANT INV_CommittedNeverAhead
PROPERTY RefSafeSpec
PROPERTY RefLive
PROPERTY LIVE_CommitCatchesUp
