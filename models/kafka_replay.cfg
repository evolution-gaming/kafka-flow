\* spec: Kafka
\* expect: HOLDS
\* flags: -deadlock
\* The atomic binding closes the replay window. The snapshot write and the input-offset commit are bound
\* in one transaction (sendOffsetsToTransaction, KIP-447), so the committed offset never trails the durable
\* snapshot (INV_NoReplayGap holds) and a recovering owner resumes AT it -- never below. Safety and liveness
\* both hold. The paired control kafka_replay_unbound flips AtomicBind=FALSE: the window opens and the
\* owner's re-flush below the snapshot regresses it.
SPECIFICATION Spec
CONSTANTS MaxOffset = 3  Coupled = TRUE  Seeded = TRUE  AtomicBind = TRUE
INVARIANT RefTypeOK
INVARIANT INV_NoReplayGap
PROPERTY RefSafeSpec
PROPERTY RefLive
