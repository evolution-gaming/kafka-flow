\* expect: HOLDS
\* flags: -deadlock
\* flush-blocks-then-schedule: the committed offset stays within the durable prefix even at Cap=1
\* (every write its own transaction = maximum split of a flush across batches)
SPECIFICATION Spec
CONSTANTS
  MaxOffset = 3
  Cap       = 1
  Gated     = TRUE
INVARIANT TypeOK
INVARIANT INV_OffsetWithinDurable
