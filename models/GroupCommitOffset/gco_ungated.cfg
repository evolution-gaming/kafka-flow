\* expect: VIOLATES INV_OffsetWithinDurable
\* negative control: scheduling an offset before its writes are durable (the coupling dropped) lets a
\* transaction bind a committed offset ahead of the durable prefix -> recovery would lose writes
SPECIFICATION Spec
CONSTANTS
  MaxOffset = 3
  Cap       = 1
  Gated     = FALSE
INVARIANT INV_OffsetWithinDurable
