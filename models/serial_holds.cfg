\* spec: FlushCell
\* expect: HOLDS
\* A4, the per-key SERIALIZATION assumption, checked as a paired positive. Serialized=TRUE: the poll
\* thread serializes callbacks and processing, so a concurrent Append cannot interleave the non-atomic
\* flushCell compound (read -> database.write -> markPersisted). The compound is effectively atomic and
\* INV_NoLostWrite holds. This does NOT prove A4 (TLC cannot see JVM threads); it shows the hazard is
\* closed exactly when serialization holds. The paired failure is serial_race.
SPECIFICATION Spec
CONSTANTS Serialized = TRUE
INVARIANT TypeOK
INVARIANT INV_NoLostWrite
