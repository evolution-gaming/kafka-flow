\* spec: Cassandra
\* expect: VIOLATES-TEMPORAL RefLive
\* The journal-first flush ordering, broken (JournalOrder=FALSE: the snapshot lands while the journal
\* lags), with the trails-guard also absent (FloorGuard=FALSE). A LIVE key's events-recovery floor is
\* the journal fold's offset -- a live snapshot seeds no floor in this mode -- so the recovering owner
\* comes back BELOW its own durable snapshot, replays, flushes at the lagging offset, and the offset
\* CAS rejects the legitimate owner: teardown, re-recover (the journal still lags), the same conflict
\* -- a livelock. Safety holds (a conflict writes nothing). This pins `journals.flush *>
\* snapshots.flush` (Buffers.flushState) as load-bearing whenever the fold is trusted blindly. Notably,
\* the trails-guard SUBSUMES the ordering for correctness -- with FloorGuard=TRUE a lagging journal
\* just falls back to the fenced snapshot (cassandra_events_refines holds even under
\* JournalOrder=FALSE) -- at the cost of making the journal pointless: the ordering is what makes
\* events-recovery worth having, the guard is what makes it safe. Contrast cassandra_events_refines,
\* cassandra_events_journal_revive.
SPECIFICATION Spec
CONSTANTS MaxOffset = 3  Guarded = TRUE  Tombstone = TRUE  Fix = TRUE  Spurious = FALSE  TombFloor = TRUE  MonotonicInit = TRUE  ReapTTL = FALSE  EventsRecovery = TRUE  JournalOrder = FALSE  FloorGuard = FALSE  FloorFilter = TRUE  SkipTomb = FALSE
PROPERTY RefLive
