\* spec: GroupCommitLanes
\* expect: VIOLATES-TEMPORAL LIVE_MarkersNotStarved
\* G1 liveness control: the marker lane's own self-trigger is dropped, so markers
\* are only drained when a write transaction happens to run. A marker scheduled
\* after the last write is committed has no write to ride and is stranded forever.
CONSTANTS N = 3  Cap = 2
  Gated = TRUE  SharedBudget = FALSE  MarkerSelfCommit = FALSE
  EnableAbort = FALSE  AtomicDurable = TRUE
SPECIFICATION Spec
PROPERTIES LIVE_MarkersNotStarved
