\* spec: RecoveryRead
\* expect: HOLDS
\* flags: -deadlock
\* The composed corner (A+B) under the foreign open transaction: B's stable-id takeover aborts the
\* partition's OWN-lineage leftover, but the foreign transaction is outside the lineage and survives
\* init (as in recoveryread_lso_foreign, where B alone then under-reads). Here A's high-watermark
\* bound backstops it: the read waits the foreign transaction out and linearizes complete. This is
\* why the recommendation keeps A when B is adopted -- A converts B's silent foreign-pin residual
\* into a bounded, correct wait. Terminates via the broker timeout on the foreign transaction.
SPECIFICATION Spec
CONSTANTS StableId = TRUE  HwTarget = TRUE  Foreign = TRUE  EndOffsetsIsLSO = TRUE  Truncation = FALSE  Tripwire = FALSE  FreezeObserved = TRUE
INVARIANT TypeOK
INVARIANT INV_ReadCommittedOnly
PROPERTY RefAtomic
PROPERTY Terminates
