\* spec: CasFirstWrite
\* expect: VIOLATES INV_NoStaleOverwrite
\* flags: -deadlock
\* The offset guard is load-bearing even inside the compound: ungated UPDATEs
\* let a stale writer overwrite a strictly-higher cell.
CONSTANTS
  Writers = {w1, w2}
  MaxOffset = 2
  Guarded = FALSE
  Reap = FALSE
SPECIFICATION Spec
INVARIANTS TypeOK INV_NoStaleOverwrite
