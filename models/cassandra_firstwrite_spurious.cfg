\* spec: Cassandra
\* expect: HOLDS
\* flags: -deadlock
\* The first-write compound (CasFirstWrite) interacting with the conflict/recover loop. Its only deviation
\* from the atomic CAS is a SPURIOUS conflict -- the retry finds the row gone. Injected here (Spurious=TRUE,
\* bounded to once): on a first write the flush raises and the flow tears down. Because the row is left
\* ABSENT, recovery finds no snapshot (recoveredAt resets to 0) -- NO replay window -- and the retry
\* succeeds. So unlike the replay-window livelock (cassandra_replay_fixoff), it CONVERGES: safety, durable
\* correctness and liveness all hold. This confirms the "recovers on its next flush" claim CasFirstWrite
\* asserts but cannot check (it treats a conflict as terminal).
SPECIFICATION Spec
CONSTANTS MaxOffset = 3  Guarded = TRUE  Tombstone = TRUE  Fix = TRUE  Spurious = TRUE
INVARIANT RefTypeOK
INVARIANT RefDurableOK
INVARIANT INV_NoStaleOverwrite
INVARIANT INV_NoCorruptDurable
PROPERTY RefSafeSpec
PROPERTY RefLive
