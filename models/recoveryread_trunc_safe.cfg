\* spec: RecoveryRead
\* expect: HOLDS
\* flags: -deadlock
\* Safety under truncation, MECHANIZED (review caveat C1, now closed). With the history-variable
\* mapping (FreezeObserved = TRUE) the read's observation is frozen at its linearization point, so an
\* unclean-leader-election Truncate cannot un-observe an already-seen record. RefAtomic therefore holds
\* even under Truncation = TRUE: a read that completes delivers exactly the atomic observation, and a
\* read whose target outlived the log fails loudly delivering nothing (abort-before-response, a stutter
\* under the atomic spec). This is the tripwire's safety-under-truncation, previously argued in prose.
\* Paired with recoveryread_trunc_recompute (the negative control: drop the history variable and the
\* mapping spuriously drops a record at the Truncate step).
\* (INV_ReadCommittedOnly is deliberately NOT checked here: it recomputes "every returned index is
\* still committed in the CURRENT log", an append-only assumption a Truncate legitimately breaks -- a
\* record correctly delivered can later be truncated away, which is not a read defect. RefAtomic is the
\* genuine safety property under truncation; the frozen `observed` carries "committed when seen".)
SPECIFICATION Spec
CONSTANTS StableId = TRUE  HwTarget = FALSE  Foreign = FALSE  EndOffsetsIsLSO = TRUE  Truncation = TRUE  Tripwire = TRUE  FreezeObserved = TRUE
INVARIANT TypeOK
PROPERTY RefAtomic
