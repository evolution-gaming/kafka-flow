\* spec: Cassandra
\* expect: VIOLATES-TEMPORAL RefLive
\* The replay-window livelock re-opened through the post-read INIT. The tombstone floor is surfaced
\* (TombFloor=TRUE) and the monotone buffer is on (Fix=TRUE), but the recovery's second seeding -- the
\* journal fold init'd as an already-persisted cell (Persistence.read -> initPersistedState) -- is NOT
\* routed through the monotonic put (MonotonicInit=FALSE): a journal that trails the snapshot store
\* (a partially-failed delete, a journal TTL) inits below the floor and REGRESSES it. The owner then
\* flushes below the durable offset, the CAS rejects it though the owner is legitimate, the flow tears
\* down, re-recovers (floor restored), re-inits (floor regressed): the same conflict->recover->retry
\* lasso as cassandra_tombstone_replay, reached through the init rather than the read. Safety holds (a
\* conflict writes nothing): purely a LIVENESS failure. The fix (MonotonicInit=TRUE -- Snapshots.
\* initPersisted routed through the monotonic put, dropping a below-floor init) closes it; see
\* cassandra_refines.
SPECIFICATION Spec
CONSTANTS MaxOffset = 3  Guarded = TRUE  Tombstone = TRUE  Fix = TRUE  Spurious = FALSE  TombFloor = TRUE  MonotonicInit = FALSE  ReapTTL = FALSE  EventsRecovery = FALSE  JournalOrder = TRUE  FloorGuard = TRUE  FloorFilter = TRUE  SkipTomb = FALSE
PROPERTY RefLive
