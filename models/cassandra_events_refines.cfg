\* spec: Cassandra
\* expect: HOLDS
\* THEOREM: the compare-and-set mode composed with EVENTS-RECOVERY (PersistenceOf.restoreEvents) still
\* implements SingleWriterStore. State is folded from the journal, not the snapshot store; the snapshot
\* store contributes only a deleted key's tombstone floor (the fenced ReadState read -- TombFloor), a live
\* key's floor is the journal fold's own offset, and the journal-first flush ordering (JournalOrder --
\* journals.flush *> snapshots.flush) keeps that floor at or above the durable snapshot, so replay-window
\* writes are dropped, never self-fenced. Safety rests on FloorFilter=TRUE: recovery folds only journal
\* rows whose offset exceeds the fenced floor, so residue rows below a delete's tombstone -- representable
\* in the row-set journal -- are excluded at every recovery. This is non-vacuous: the paired
\* cassandra_events_revive_reentry (same model, FloorFilter=FALSE) reaches the polluted state and VIOLATES
\* INV_NoCorruptDurable. Paired failures: cassandra_events_unordered (the ordering broken),
\* cassandra_events_nofloor (the tombstone floor read dropped).
SPECIFICATION Spec
CONSTANTS MaxOffset = 3  Guarded = TRUE  Tombstone = TRUE  Fix = TRUE  Spurious = FALSE  TombFloor = TRUE  MonotonicInit = TRUE  ReapTTL = FALSE  EventsRecovery = TRUE  JournalOrder = TRUE  FloorGuard = TRUE  FloorFilter = TRUE  SkipTomb = FALSE
INVARIANT RefTypeOK
INVARIANT RefDurableOK
INVARIANT INV_NoStaleOverwrite
INVARIANT INV_NoCorruptDurable
PROPERTY RefSafeSpec
PROPERTY RefLive
