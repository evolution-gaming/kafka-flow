\* spec: Cassandra
\* expect: VIOLATES INV_NoResurrection
\* The F-9 never-persisted-delete resurrection, PRE-FIX (SkipTomb=TRUE). A delete of a key created and
\* deleted before it was ever durably persisted skips the DB write (persist=FALSE): NO tombstone, the row
\* stays Absent, but the consumer offset STILL commits past the delete. The deleted key is durably Absent
\* with no fence, so a revoked zombie still holding the buffered pre-delete snapshot flushes it onto the
\* absent row (gated only by the snapshot CAS, which an absent row passes) -- durably resurrecting the
\* deleted key below the committed delete offset. Invisible to the store.offset-keyed invariants (the
\* revived cell is a self-consistent fold at its own offset), so INV_NoResurrection relates the durable
\* store to committed. The shipped fix always writes the offset-carrying tombstone (SkipTomb=FALSE), which
\* fences the zombie; the paired positive is cassandra_refines (INV_NoResurrection HOLDS there).
SPECIFICATION Spec
CONSTANTS MaxOffset = 3  Guarded = TRUE  Tombstone = TRUE  Fix = TRUE  Spurious = FALSE  TombFloor = TRUE  MonotonicInit = TRUE  ReapTTL = FALSE  EventsRecovery = FALSE  JournalOrder = TRUE  FloorGuard = TRUE  FloorFilter = TRUE  SkipTomb = TRUE
INVARIANT INV_NoResurrection
