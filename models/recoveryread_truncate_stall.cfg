\* spec: RecoveryRead
\* expect: VIOLATES-TEMPORAL Terminates
\* flags: -deadlock
\* Issue #849, reached by making the environment honest: with Truncation on (unclean
\* leader election loses the log tail) the captured target can outlive the log end, and
\* Complete -- whose position must REACH the target -- is disabled forever. The read
\* hangs; in the real system recovery runs on the poll thread, so the member is evicted
\* at the rebalance timeout while the process stays up and passes liveness checks. A pure
\* liveness failure (safety untouched: nothing wrong is ever returned). The first version
\* of this model could not express it -- its log was append-only, an unwritten "the log
\* never shrinks" assumption; the Truncation fact knob makes that exclusion stated and
\* this config is what its wrong reading costs. Remedy-orthogonal (shown here under the
\* stable-id candidate; the HW bound stalls identically): no bound choice fixes a bound
\* that outlives the log -- the tripwire does (the paired positive,
\* recoveryread_truncate_tripwire).
SPECIFICATION Spec
CONSTANTS StableId = TRUE  HwTarget = FALSE  Foreign = FALSE  EndOffsetsIsLSO = TRUE  Truncation = TRUE  Tripwire = FALSE  FreezeObserved = TRUE
INVARIANT TypeOK
PROPERTY Terminates
