\* spec: RecoveryDeadline
\* expect: HOLDS
\* flags: -deadlock
\* The R-849 remedy working: a no-progress tripwire (Tripwire = TRUE, NoProgressTrip = TRUE) with
\* TripAt < Deadline catches the #849 hang (HealthyProgress = FALSE) and fails loudly BEFORE the
\* eviction deadline -- the member is never silently evicted.
SPECIFICATION Spec
CONSTANTS TripAt = 2  Deadline = 4  Tripwire = TRUE  NoProgressTrip = TRUE  HealthyProgress = FALSE
INVARIANT TypeOK
INVARIANT INV_NoSilentEviction
