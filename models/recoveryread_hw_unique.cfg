\* spec: RecoveryRead
\* expect: HOLDS
\* flags: -deadlock
\* Remedy (1), alternative A: keep unique ids, bound the read at the
\* high watermark (captured through an uncommitted-isolation lens, immune to the
\* EndOffsetsIsLSO fact knob). The read_committed position cannot pass A's open
\* transaction, so the read WAITS until the broker's timeout aborts it, then completes --
\* and linearizes at its capture instant (RefAtomic). Kafka Streams' restore shape
\* (KAFKA-10167) -- mandatory there, since eos-v2 ids are per-process and no takeover ever
\* aborts a dead instance's transaction (ext(K6)). Correct but pays the wait.
SPECIFICATION Spec
CONSTANTS StableId = FALSE  HwTarget = TRUE  Foreign = FALSE  EndOffsetsIsLSO = TRUE  Truncation = FALSE  Tripwire = FALSE  FreezeObserved = TRUE
INVARIANT TypeOK
INVARIANT INV_ReadCommittedOnly
PROPERTY RefAtomic
PROPERTY Terminates
