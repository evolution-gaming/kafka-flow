\* spec: CasFirstWrite
\* expect: HOLDS
\* flags: -deadlock
\* Safety survives a TTL reap mid-protocol: even with a row removed between the
\* INSERT and the retry, no stale overwrite occurs.
CONSTANTS
  Writers = {w1, w2}
  MaxOffset = 2
  Guarded = TRUE
  Reap = TRUE
SPECIFICATION Spec
INVARIANTS TypeOK INV_NoStaleOverwrite
