\* spec: RecoveryRead
\* expect: HOLDS
\* flags: -deadlock
\* The "both remedies" corner of the F-10 remedy 2x2 over {StableId, HwTarget}: apply BOTH the stable
\* per-partition id (B) AND the high-watermark bound (A). Confirms the two remedies
\* COMPOSE -- neither interferes with the other, RefAtomic still holds. With the 2x2's other three
\* corners (recoveryread_lso_unique = neither = VIOLATES; recoveryread_hw_unique = A only = HOLDS;
\* recoveryread_lso_stable = B only = HOLDS) this establishes: the under-read is real without a remedy,
\* EITHER remedy alone closes it, and the two are composable. Note they are safety-equivalent, not
\* cost-equivalent: "both" inherits A's wait (the HW bound still parks on B's own dangling transaction
\* until the broker timeout), so Terminates holds only under the timeout-abort -- unlike B alone, which
\* completes at the dangling transaction with no wait. The A-vs-B decision is exactly that cost
\* difference, not a correctness one.
SPECIFICATION Spec
CONSTANTS StableId = TRUE  HwTarget = TRUE  Foreign = FALSE  EndOffsetsIsLSO = TRUE  Truncation = FALSE  Tripwire = FALSE  FreezeObserved = TRUE
INVARIANT TypeOK
INVARIANT INV_ReadCommittedOnly
INVARIANT INV_LineageSerialized
PROPERTY RefAtomic
PROPERTY Terminates
