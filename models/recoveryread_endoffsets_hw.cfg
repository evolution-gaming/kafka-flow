\* spec: RecoveryRead
\* expect: HOLDS
\* flags: -deadlock
\* The OTHER reading of the platform fact -- the one the design first merged under: the
\* reader's own endOffsets returns the log end (EndOffsetsIsLSO = FALSE), so the bounded
\* read parks at any open transaction, waits it out ("a reader can stall behind its
\* last-stable-offset"), and linearizes cleanly (RefAtomic holds). Same design point as
\* recoveryread_lso_unique (unique ids, own-endOffsets bound); ONLY the reading of ext(K2)
\* differs -- and the verdict flips (HOLDS here, VIOLATES-REFINEMENT there). That
\* divergence is what this pair mechanizes: when two plausible readings of one platform
\* fact yield different verdicts, the fact is load-bearing and must be pinned by primary
\* source plus a precondition-asserted experiment BEFORE the HOLDS is believed. The pin
\* (KafkaConsumer javadoc, ext(K2); the 85 ms live under-read) decided TRUE: this config
\* models the belief that let F-10 merge, kept as the fact-sweep sibling of the finding --
\* not as a design option.
SPECIFICATION Spec
CONSTANTS StableId = FALSE  HwTarget = FALSE  Foreign = FALSE  EndOffsetsIsLSO = FALSE  Truncation = FALSE  Tripwire = FALSE  FreezeObserved = TRUE
INVARIANT TypeOK
INVARIANT INV_ReadCommittedOnly
PROPERTY RefAtomic
PROPERTY Terminates
