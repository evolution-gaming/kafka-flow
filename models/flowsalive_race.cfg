\* spec: FlowsAlive
\* expect: VIOLATES INV_FlowsAlive
\* Negative control that makes the positive flowsalive_holds load-bearing. Dropping the awaited teardown
\* coupling (AwaitTeardown=FALSE, a fire-and-forget refactor of `TopicFlow.remove`) lets a revoked flow
\* linger `live` while the node already owns the new generation: reassign {p1} -> {p2} and the p1 flow is
\* alive-but-un-owned — the foreign-partition owner that, absent a broker per-partition fence, could commit
\* under a fresh token. INV_FlowsAlive is violated: the exact race the synchronous await exists to prevent.
SPECIFICATION SafeSpec
CONSTANTS Partitions = {p1, p2}  MaxGen = 3  AwaitTeardown = FALSE
INVARIANTS TypeOK INV_FlowsAlive
