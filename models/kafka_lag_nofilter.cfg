\* spec: Kafka
\* expect: VIOLATES-REFINEMENT RefSafeSpec
\* flags: -deadlock
\* The residual replay window's protection, removed. The binding's one-round commit lag means a new owner
\* can resume below its recovered snapshot; the recovered-snapshot filter (SnapshotFold -- ReplayFilter
\* here) is what drops the replayed events. Without it the owner folds events already inside its recovered
\* base and flushes the DOUBLE-FOLDED state at a replayed offset: wrong contents below the snapshot -- the
\* mapped hwm regresses and the refinement fails. Pins that the filter is load-bearing under the faithful
\* binding, completing the K1 correction: the binding narrows the window; the filter closes it.
SPECIFICATION Spec
CONSTANTS MaxOffset = 3  Coupled = TRUE  Seeded = TRUE  AtomicBind = TRUE  Refresh = TRUE  ReplayFilter = FALSE
PROPERTY RefSafeSpec
