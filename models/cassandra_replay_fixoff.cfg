\* spec: Cassandra
\* expect: VIOLATES-TEMPORAL RefLive
\* The replay-window livelock, with the fix removed. After a handover the owner resumes below its
\* recovered snapshot; without the monotone buffer (Fix=FALSE) it flushes the lagging offset, the offset
\* CAS rejects it though the owner is legitimate, the flush raises and the flow tears down -- then
\* re-recovers the SAME snapshot and resumes below it again, conflicting again: a conflict->recover->retry
\* loop (TLC shows the lasso) that never commits, so the mapped high-water never reaches the end. Safety
\* still holds (a conflict writes nothing): this is purely a LIVENESS failure. The zombie is present and
\* Guarded, so a genuinely stale writer is still correctly rejected -- only the legitimate owner livelocks.
\* Contrast cassandra_refines (Fix=TRUE, holds) and kafka_replay (the atomic binding closes the window).
SPECIFICATION Spec
CONSTANTS MaxOffset = 3  Guarded = TRUE  Tombstone = TRUE  Fix = FALSE  Spurious = FALSE  TombFloor = TRUE  MonotonicInit = TRUE  ReapTTL = FALSE  EventsRecovery = FALSE  JournalOrder = TRUE  FloorGuard = TRUE  FloorFilter = TRUE  SkipTomb = FALSE
PROPERTY RefLive
