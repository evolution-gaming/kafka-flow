\* spec: Cassandra
\* expect: HOLDS
\* The guard subsumes the flush ordering, CHECKED (not just asserted). JournalOrder=FALSE lets the
\* snapshot land while the journal lags - which self-fences a live key WITHOUT the guard
\* (cassandra_events_unordered, FloorFilter/FloorGuard off, VIOLATES-TEMPORAL RefLive). With the offset
\* floor filter on (FloorGuard=TRUE, FloorFilter=TRUE) recovery folds the surviving journal suffix onto
\* the fenced store's snapshot as the base, so a lagging journal simply contributes fewer rows and the
\* store's snapshot carries the rest: it converges. The ordering (journals.flush *> snapshots.flush) is
\* what makes events-recovery worth having (the journal is the state source); the floor filter is what
\* makes it safe even when the ordering is violated. Paired with cassandra_events_unordered (the
\* unguarded negative) and cassandra_events_refines (ordered + guarded).
SPECIFICATION Spec
CONSTANTS MaxOffset = 3  Guarded = TRUE  Tombstone = TRUE  Fix = TRUE  Spurious = FALSE  TombFloor = TRUE  MonotonicInit = TRUE  ReapTTL = FALSE  EventsRecovery = TRUE  JournalOrder = FALSE  FloorGuard = TRUE  FloorFilter = TRUE  SkipTomb = FALSE
INVARIANT RefTypeOK
INVARIANT RefDurableOK
INVARIANT INV_NoStaleOverwrite
INVARIANT INV_NoCorruptDurable
PROPERTY RefSafeSpec
PROPERTY RefLive
