\* spec: GroupCommitLanes
\* expect: HOLDS
\* G2 abort-path positive: aborts enabled, durability atomic with the commit. Even
\* when a write's transaction aborts and the marker lane later commits an offset,
\* the committed offset never leads the durable prefix (an aborted write was never
\* visible as durable, so the flow never scheduled an offset covering it). Under
\* AtomicDurable=TRUE the abort touches neither co nor done, so this confirms that
\* *enabling* aborts introduces no violation; the abort HAZARD itself is exhibited by
\* gclanes_abort_race (AtomicDurable=FALSE), which is where G2's abort coverage lives.
CONSTANTS N = 3  Cap = 2
  Gated = TRUE  SharedBudget = FALSE  MarkerSelfCommit = TRUE
  EnableAbort = TRUE  AtomicDurable = TRUE
SPECIFICATION SafeSpec
INVARIANTS TypeOK INV_OffsetWithinDurable
