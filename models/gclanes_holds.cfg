\* spec: GroupCommitLanes
\* expect: HOLDS
\* The two-lane writer, all guarantees on: separate lanes (markers never steal a
\* write slot), the marker lane self-triggers (no starvation), the offset coupling
\* holds, no aborts. Termination + both G1 and G2 safety invariants hold together.
\* Note: with SharedBudget=FALSE, INV_NoSlotSteal holds by construction here -- it is
\* asserted for the shipping config, but its load-bearing (knob-off vs -on) check is
\* gclanes_shared.
CONSTANTS N = 3  Cap = 2
  Gated = TRUE  SharedBudget = FALSE  MarkerSelfCommit = TRUE
  EnableAbort = FALSE  AtomicDurable = TRUE
SPECIFICATION Spec
INVARIANTS TypeOK INV_OffsetWithinDurable INV_NoSlotSteal
PROPERTIES Termination LIVE_MarkersNotStarved
