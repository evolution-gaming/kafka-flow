\* spec: TokenSync
\* expect: VIOLATES-TEMPORAL Synced
\* flags: -deadlock
\* 2x2 cell [capture only]. Capture cannot catch a SILENT bump (no callback drives it), so the token is
\* stuck below liveGen -- the KIP-848 case. Safety still holds (TokenNeverLeads); availability fails, the
\* same shape as kafka_genlag. (When every bump fires a callback instead, capture alone DOES suffice --
\* tokensync_capture_assigning; that is the capture=refresh equivalence, and its boundary is this silent bump.)
SPECIFICATION Spec
CONSTANTS MaxGen = 3  Capture = TRUE  Refresh = FALSE  AllowSilent = TRUE
INVARIANT TypeOK
INVARIANT TokenNeverLeads
PROPERTY Synced
