\* spec: RecoveryRead
\* expect: HOLDS
\* flags: -deadlock
\* The #849 remedy: a bounded no-progress tripwire (fail loudly once no progress outlasts
\* any transaction's possible lifetime, deliberately below max.poll.interval.ms). Same
\* truncating environment as recoveryread_truncate_stall, Tripwire on: a read whose target
\* outlives the log end fails loudly ("failed") instead of hanging into silent eviction,
\* and a healthy read still completes -- TerminatesOrFails holds. Fail-loud is
\* abort-before-response: the failed read returns nothing, so it is invisible to (and safe
\* under) the atomic-read spec; the flow's supervision restarts recovery against the
\* truncated log.
SPECIFICATION Spec
CONSTANTS StableId = TRUE  HwTarget = FALSE  Foreign = FALSE  EndOffsetsIsLSO = TRUE  Truncation = TRUE  Tripwire = TRUE  FreezeObserved = TRUE
INVARIANT TypeOK
PROPERTY TerminatesOrFails
