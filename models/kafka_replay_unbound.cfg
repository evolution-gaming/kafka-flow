\* spec: Kafka
\* expect: VIOLATES-REFINEMENT RefSafeSpec
\* flags: -deadlock
\* The atomic binding removed (AtomicBind=FALSE, the non-transactional `caching` backend): the snapshot
\* and the input offset commit separately, so a recovering owner can resume BELOW the snapshot (the replay
\* window, like Cassandra). But Kafka has no offset gate -- and its monotone buffer is inert -- so the
\* owner's re-flush below the snapshot is ACCEPTED and regresses topic.offset -> the mapped hwm regresses
\* -> Kafka no longer refines. Worse than Cassandra's livelock: a silent stale overwrite (data loss). This
\* is why the transactional backend's atomic binding is load-bearing. Contrast kafka_replay (HOLDS).
SPECIFICATION Spec
CONSTANTS MaxOffset = 3  Coupled = TRUE  Seeded = TRUE  AtomicBind = FALSE
PROPERTY RefSafeSpec
