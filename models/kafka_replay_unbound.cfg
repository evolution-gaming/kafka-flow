\* spec: Kafka
\* expect: VIOLATES-REFINEMENT RefSafeSpec
\* flags: -deadlock
\* The atomic binding removed (AtomicBind=FALSE, the non-transactional `caching` backend). A plain
\* produce is gated by NOTHING -- no transaction, no generation check at the topic -- so a revoked
\* zombie's flush always lands, and a lower offset regresses topic.offset -> the mapped hwm regresses ->
\* Kafka no longer refines. Its consumer-side offset commits ARE fenced, but that protects nothing: the
\* data is already overwritten. Worse than Cassandra's livelock: a silent stale overwrite (data loss).
\* This is why the transactional backend's binding is load-bearing. Contrast kafka_replay (HOLDS).
SPECIFICATION Spec
CONSTANTS MaxOffset = 3  Coupled = TRUE  Seeded = TRUE  AtomicBind = FALSE  Refresh = TRUE  ReplayFilter = TRUE
PROPERTY RefSafeSpec
