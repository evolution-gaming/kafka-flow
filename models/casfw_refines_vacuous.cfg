\* spec: CasFirstWrite
\* expect: VIOLATES-REFINEMENT RefinesAtomic
\* flags: -deadlock
\* The negative control for casfw_refines ITSELF: is the refinement mapping capable of failing? A
\* vacuous mapping (one that maps every compound step to stuttering, or an abstract spec weak enough
\* to allow anything) would let casfw_refines pass without checking anything. Here the compound runs
\* UNGATED (Guarded = FALSE) against the GUARDED atomic spec (SpecGuarded = TRUE): an ungated UPDATE
\* overwriting a strictly-higher present cell is a stored-transition the guarded atomic Persist does
\* not allow (it leaves the cell unchanged when the guard fails), so RefinesAtomic must be violated.
\* Pairs with casfw_refines (mapping holds when impl and spec agree) and closes the audit's accepted
\* pairing hole #1 (model-fidelity.md).
SPECIFICATION Spec
CONSTANTS Writers = {w1, w2}  MaxOffset = 2  Guarded = FALSE  SpecGuarded = TRUE  Reap = FALSE
PROPERTY RefinesAtomic
