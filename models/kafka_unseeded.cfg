\* stale write lands -> Kafka no longer refines.
SPECIFICATION Spec
CONSTANTS MaxOffset = 3  Coupled = TRUE  Seeded = FALSE  AtomicBind = TRUE  Refresh = TRUE  ReplayFilter = TRUE
PROPERTY RefSafeSpec
