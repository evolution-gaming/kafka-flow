\* spec: RecoveryRead
\* expect: HOLDS
\* flags: -deadlock
\* The paired POSITIVE to recoveryread_lso_foreign: the SAME foreign open transaction (a
\* producer outside the partition's id lineage, which no takeover aborts), but under remedy A
\* (the high-watermark bound) instead of B's own-endOffsets/LSO bound. A captures the true high
\* watermark, so the read WAITS the foreign transaction out instead of completing below it -- the
\* refinement holds. Read against recoveryread_lso_foreign (B, same Foreign=TRUE, VIOLATES) this is
\* the proof of the asymmetry: A is full safety unconditionally; B is not (its safety is conditional
\* on no out-of-lineage writer). Terminates too: the wait resolves when the broker times the foreign
\* transaction out (TimeoutAbort) -- A's ~70 s tail, not a hang.
SPECIFICATION Spec
CONSTANTS StableId = FALSE  HwTarget = TRUE  Foreign = TRUE  EndOffsetsIsLSO = TRUE  Truncation = FALSE  Tripwire = FALSE  FreezeObserved = TRUE
INVARIANT TypeOK
INVARIANT INV_ReadCommittedOnly
PROPERTY RefAtomic
PROPERTY Terminates
