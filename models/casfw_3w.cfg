\* spec: CasFirstWrite
\* expect: HOLDS
\* flags: -deadlock
\* Three concurrent first-writers: a third can act between a loser's INSERT-fail and its retry;
\* stresses "one retry is enough".
SPECIFICATION Spec
CONSTANTS Writers = {w1, w2, w3}  MaxOffset = 2  Guarded = TRUE  SpecGuarded = TRUE  Reap = FALSE
INVARIANT TypeOK
INVARIANT INV_NoStaleOverwrite
