\* spec: Cassandra
\* expect: VIOLATES INV_NoCorruptDurable
\* The journal-revive RE-ENTRY (F-7) - the negative control for the fold-result comparison the F-6 fix
\* (Snapshots.reconcile) used. FloorGuard=TRUE with FloorFilter=FALSE: recovery folds the WHOLE journal
\* and discards it only when the fold provably TRAILS the store offset. That holds at the first recovery
\* (the residue below the tombstone trails it, so it is discarded) - but the journal is unfenced, so once
\* legitimate post-delete events advance the journal to or past the store offset, the polluted fold no
\* longer trails: the fold-vs-store comparison passes and the pre-delete residue is folded back to life at
\* a correct-looking offset, persisted durably. Reachable here because Handover is bounded to two: the
\* second recovery re-folds the advanced-but-polluted journal. This is the defect that offset comparison
\* cannot fix (offset is not provenance); the paired positive is cassandra_events_refines (FloorFilter=TRUE,
\* the structural floor filter - fold only rows above the fenced floor onto the store base - which holds at
\* every recovery). Contrast cassandra_events_journal_revive (no guard at all, fails at the first recovery).
\*
\* NOTE on the counterexample at this bound: at MaxOffset=3 the control actually fires via the
\* journal-UNDER-representation LOSS dual, not the delete-revive narrated above. TLC's shortest trace is
\* <persist,persist,persist>: a zombie appends only offset 2 (journal = {2}) then a handover, and the
\* fold-vs-store comparison lets the WHOLE journal folded from EMPTY through -- discarding the fenced
\* snapshot base at offset 1, so the owner folds forward to {2,3} instead of {1,2,3} and persists a lossy
\* fold. Same F-7 family (an unfenced journal is not a trustworthy prefix -- here it under-represents
\* rather than resurrects), same fix (the structural floor filter, cassandra_events_refines). The genuine
\* pre-delete delete-revive re-entry needs MaxOffset>=4 (a persist, a delete, then two post-delete events
\* to advance the journal past the store) and is NOT the counterexample TLC reports at this bound.
SPECIFICATION Spec
CONSTANTS MaxOffset = 3  Guarded = TRUE  Tombstone = TRUE  Fix = TRUE  Spurious = FALSE  TombFloor = TRUE  MonotonicInit = TRUE  ReapTTL = FALSE  EventsRecovery = TRUE  JournalOrder = TRUE  FloorGuard = TRUE  FloorFilter = FALSE  SkipTomb = FALSE
INVARIANT INV_NoCorruptDurable
