\* spec: Kafka
\* expect: VIOLATES INV_NoReplayGap
\* The idealized no-gap invariant, pinned as unreachable without any binding: under AtomicBind=FALSE the
\* committed offset and the snapshot move with no relation at all (free commit cadence, ungated zombie
\* writes), so INV_NoReplayGap is violated outright. (Under the faithful binding the invariant does not
\* hold either -- the one-round lag is real -- which is why kafka_replay checks the honest
\* INV_CommittedNeverAhead + LIVE_CommitCatchesUp pair instead; this config keeps the idealized property
\* as a named, checked negative rather than a silent overclaim.)
SPECIFICATION Spec
CONSTANTS MaxOffset = 3  Coupled = TRUE  Seeded = TRUE  AtomicBind = FALSE  Refresh = TRUE  ReplayFilter = TRUE
INVARIANT INV_NoReplayGap
