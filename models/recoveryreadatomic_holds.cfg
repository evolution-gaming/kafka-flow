\* spec: RecoveryReadAtomic
\* expect: HOLDS
\* flags: -deadlock
\* The spec is self-consistent (cf. sws_holds): the atomic read -- one linearization point
\* observing exactly the committed set, then a response -- terminates and returns only
\* committed records, under the full double-handover cast with the broker's timeout abort.
SPECIFICATION Spec
CONSTANTS StableId = TRUE  Foreign = FALSE  Truncation = FALSE
INVARIANT TypeOK
INVARIANT INV_ReadCommittedOnly
PROPERTY Terminates
