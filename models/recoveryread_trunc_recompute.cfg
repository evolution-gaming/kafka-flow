\* spec: RecoveryRead
\* expect: VIOLATES-REFINEMENT RefAtomic
\* flags: -deadlock
\* The negative control proving the history variable is load-bearing (the review's C1 finding, now a
\* checked control). With FreezeObserved = FALSE the mapping recomputes the observed set from the
\* CURRENT log at every state; under Truncation = TRUE a Truncate step that drops an already-observed
\* committed record makes the mapped result shrink -- an abstract step RecoveryReadAtomic has no
\* counterpart for (its result is frozen after DoRead), so the step simulation fails AT the Truncate.
\* Same environment as recoveryread_trunc_safe; only the mapping differs. This is why safety under
\* truncation needs the frozen observation, not a recompute -- and why it cannot be read off the
\* original mapping (which is correct only for the append-only, Truncation = FALSE envelope).
SPECIFICATION Spec
CONSTANTS StableId = TRUE  HwTarget = FALSE  Foreign = FALSE  EndOffsetsIsLSO = TRUE  Truncation = TRUE  Tripwire = TRUE  FreezeObserved = FALSE
INVARIANT TypeOK
PROPERTY RefAtomic
